<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Avı - SECOVVV Action Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #ff0000; }
            100% { transform: scale(1); }
        }
        @keyframes flashExplosion {
            0% { text-shadow: 0 0 0px #fff; transform: scale(1); }
            50% { text-shadow: 0 0 30px #fff, 0 0 50px #2ecc71; transform: scale(1.1); }
            100% { text-shadow: 0 0 0px #fff; transform: scale(1); }
        }
        @keyframes roketYorungeDonus {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            10% { transform: translate(200px, 0) rotate(90deg) scale(1.2); }
            25% { transform: translate(200px, 300px) rotate(180deg) scale(1.2); }
            40% { transform: translate(-200px, 300px) rotate(270deg) scale(1.2); }
            55% { transform: translate(-200px, 0) rotate(360deg) scale(1.2); }
            100% { transform: translate(0, 0) rotate(360deg) scale(1); }
        }

        .roket-yorunge { 
            animation: roketYorungeDonus 3s ease-in-out; 
            display: inline-block; 
            position: relative;
            z-index: 20; 
        }
        
        .parla { animation: flashExplosion 0.5s ease-out; }
        .sarsil { animation: shake 0.3s; }
        .panik { animation: pulse 0.5s infinite; color: #ff0000 !important; }

        .seco-signature {
            position: absolute;
            top: 25px;
            left: 5px;
            font-size: 20px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(0deg, #ff4500, #ff8c00, #ffd700, #ff8c00, #ff4500);
            background-size: 100% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fireFlow 1.5s infinite linear;
            transform: rotate(-45deg);
            pointer-events: none;
            z-index: 30;
        }
        @keyframes fireFlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 0% 100%; }
        }

        body {
            background: #000 !important;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            font-family: sans-serif;
        }

        /* ÖLÇEKLENDİRME ALANI */
        #oyun-alani {
            width: 550px;
            height: 800px;
            position: relative;
            z-index: 10;
            transform-origin: center center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #anaKapsayici {
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 30, 0.4) !important;
            backdrop-filter: blur(25px) saturate(180%);
            border: 2px solid rgba(139, 92, 246, 0.15);
            box-shadow: 
                0 0 50px rgba(139, 92, 246, 0.1),
                inset 0 0 25px rgba(255,255,255,0.01);
            border-radius: 25px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
            text-align: center;
        }

        /* Kozmik Arkaplanlar Tam Ekran Kalmaya Devam Eder */
        .kozmik-nebula {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            background: radial-gradient(circle at 30% 30%, #1a0b2e 0%, #000 70%);
            animation: nebulaRenk 30s ease infinite alternate;
        }
        @keyframes nebulaRenk {
            0% { background: radial-gradient(circle at 30% 30%, #1a0b2e 0%, #000 70%); }
            50% { background: radial-gradient(circle at 70% 70%, #2c0e40 0%, #000 70%); }
            100% { background: radial-gradient(circle at 30% 30%, #1a0b2e 0%, #000 70%); }
        }
        .kozmik-yildizlar {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            background-image: radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 20px), radial-gradient(white, rgba(255,255,255,.05) 1px, transparent 30px);
            background-size: 350px 350px, 200px 200px;
            animation: yildizPirilti 10s linear infinite;
        }
        @keyframes yildizPirilti {
            from { background-position: 0 0, 0 0; } to { background-position: 350px 350px, 200px 200px; }
        }
        .kozmik-isima {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 3;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.8) 100%); pointer-events: none;
        }

        /* OYUN İÇİ SABİT BOYUTLU ELEMENTLER */
        .can { color: #e74c3c; font-size: 25px; margin: 5px; transition: all 0.3s; }
        .rekor { color: #f1c40f; font-weight: bold; font-size: 30px; margin-top: 5px; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
        .seri-rekor { color: #3498db; font-weight: bold; font-size: 24px; margin-top: 5px; margin-bottom: 15px; }
        h1 { font-size: 35px; color: white; margin-top: 0; margin-bottom: 5px; }
        .stats { font-size: 30px; color: white; }
        #sure { font-size: 35px; color: #e74c3c; font-weight: bold; margin: 10px; transition: all 0.2s; }
        #karisik-kelime { font-size: 60px; font-weight: bold; letter-spacing: 12px; color: #f1c40f; margin: 20px 0; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        #ipucu { font-size: 28px; color: #2ecc71; margin: 10px; font-family: monospace; background: rgba(0,0,0,0.2); padding: 5px; border-radius: 5px; }
        #gecen-sure-ekran { font-size: 30px; color: #3498db; height: 35px; margin-top: 10px; font-weight: bold; }
        #mesaj { margin-top:5px; height:40px; font-weight: bold; font-size: 24px; }
        
        #tahmin {
            background: rgba(0,0,0,0.5); color: #fff;
            border: 2px solid #34495e !important; border-radius: 12px;
            padding: 15px; font-size: 22px; text-align: center; outline: none; 
            width: 80%; transition: all 0.3s; margin-top: 5px;
        }
        #tahmin:focus { border-color: #8b5cf6 !important; box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }

        .kontrol-butonlari { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .kontrol-butonlari button { padding: 10px 15px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; color: white; transition: background 0.3s;}
        .btn-muzik { background: #95a5a6; font-size: 14px; }
        .admin-btn { background: #c0392b; font-size: 14px; }
        .admin-btn:hover { background: #e74c3c; }

        /* MODAL TASARIMLARI */
        .modal-overlay {
            display: none; position: absolute; z-index: 1000; left: 0; top: 0; 
            width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            justify-content: center; align-items: center; border-radius: 25px;
        }
        .modal-content {
            background: rgba(20, 25, 45, 0.95); border: 2px solid #8b5cf6;
            border-radius: 15px; padding: 30px 40px; text-align: center; color: white;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4); animation: flashExplosion 0.5s ease-out;
            width: 85%;
        }
        .modal-content input {
            padding: 12px; margin: 10px 0; border-radius: 8px; border: 2px solid #3498db;
            background: #000; color: #fff; font-size: 20px; text-align: center; outline: none; width: 90%;
        }
        .modal-content input:focus { border-color: #2ecc71; box-shadow: 0 0 10px rgba(46, 204, 113, 0.5); }
        .modal-btn { padding: 12px 25px; border: none; border-radius: 8px; background: #2ecc71; color: white; font-size: 18px; font-weight: bold; cursor: pointer; margin: 5px; transition: transform 0.2s;}
        .modal-btn:hover { transform: scale(1.05); }
        .modal-btn-iptal { background: #e74c3c; }

        #adminMesaj { font-size: 16px; font-weight: bold; height: 20px; margin: 10px 0; }

        #game-over { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 50; flex-direction: column; justify-content: center; 
            align-items: center; border-radius: 25px; 
        }
    </style>
</head>

<body>

    <audio id="arkaPlanMuzik" loop></audio>
    <audio id="dogruSes"><source src="dogru.mp3" type="audio/mpeg"></audio>
    <audio id="yanlisSes"><source src="yanlis.mp3" type="audio/mpeg"></audio>
    <audio id="m1g"><source src="m1g.mp3" type="audio/mpeg"></audio>

    <div class="kozmik-nebula"></div>
    <div class="kozmik-yildizlar"></div>
    <div class="kozmik-isima"></div>

    <div id="oyun-alani">
        
        <div id="anaKapsayici">
            
            <div class="seco-signature">SECOVVV</div>

            <div id="nickModal" class="modal-overlay">
                <div class="modal-content">
                    <h2 style="color: #f1c40f; font-size: 28px; margin-top:0;">🚀 Kelime Avı'na Hoş Geldin!</h2>
                    <p style="font-size: 18px;">Oyuna başlamak için bir Nick belirle:</p>
                    <input type="text" id="nickInput" placeholder="Oyuncu Adı" onkeypress="if(event.key === 'Enter') oyunuBaslat()">
                    <br><button class="modal-btn" onclick="oyunuBaslat()">Oyuna Başla</button>
                </div>
            </div>

            <div id="adminModal" class="modal-overlay">
                <div class="modal-content">
                    <h2 style="color: #e74c3c; margin-top:0; font-size: 28px;">⚠️ Rekor Sıfırlama</h2>
                    <p style="font-size: 16px;">Sıfırlamak için yönetici şifresini girin:</p>
                    <input type="password" id="adminInput" placeholder="Şifre" onkeypress="if(event.key === 'Enter') sifreOnayla()">
                    <div id="adminMesaj"></div> <button class="modal-btn" onclick="sifreOnayla()">Onayla</button>
                    <button class="modal-btn modal-btn-iptal" onclick="kapatAdminModal()">İptal</button>
                </div>
            </div>

            <div id="game-over">
                <h1 style="color: #e74c3c; font-size: 50px;">OYUN BİTTİ!</h1>
                <p id="final-puan" style="font-size: 24px; color: white; text-align: center;"></p>
                <button onclick="oyunuSifirla()" style="padding: 15px 30px; font-size: 20px; background: #2ecc71; color: white; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4); margin-top: 20px;">Yeniden Dene 🔄</button>
            </div>

            <h1>Kelime Avı <span id="roket" style="display:inline-block;">🚀</span></h1>
            
            <div id="oyuncuIsimGosterge" style="font-size: 22px; color: #00FFFF; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);">👤 OYUNCU: ---</div>
            
            <div id="canlar" class="can">❤️❤️❤️</div>
            
            <div class="stats">
                Toplam Puan: <span id="toplamPuan" style="font-weight: bold; color: #f1c40f;">0</span><br>
                <div id="rekorGosterge" class="rekor">🏆 En Yüksek: 0</div>
                <div id="seriGosterge" class="seri-rekor">Üst Üste: 0 | Seri Rekoru: 0</div>
            </div>
            
            <div id="sure">Süre: --</div>
            <div id="karisik-kelime">---</div>
            <div id="ipucu">---</div>
            
            <input type="text" id="tahmin" placeholder="Tahminin...">
            
            <div id="gecen-sure-ekran"></div>
            <div id="mesaj"></div>
            
            <div class="kontrol-butonlari">
                <button onclick="muzikToggle()" class="btn-muzik">🔊 Müzik Başlat/Durdur</button>
                <button onclick="rekoruSifirlaSifreli()" class="admin-btn">🗑️ Rekoru Sıfırla</button>
            </div>

        </div>
    </div>

    <script src="kelimeler.js"></script> 

    <script>
        // --- DİNAMİK ÖLÇEKLENDİRME MOTORU ---
        function oyunAlaniniOlceklendir() {
            const oyunAlani = document.getElementById("oyun-alani");
            const pencereGenislik = window.innerWidth;
            const pencereYukseklik = window.innerHeight;
            
            const genislikOrani = pencereGenislik / 590; 
            const yukseklikOrani = pencereYukseklik / 840; 
            
            const olcek = Math.min(genislikOrani, yukseklikOrani);
            
            oyunAlani.style.transform = `scale(${olcek})`;
        }
        window.addEventListener("resize", oyunAlaniniOlceklendir);
        // ------------------------------------

        const muzikListesi = ["ozan.mp3"];
        let oyuncuAdi = "MİSAFİR"; 
        
        function muzikSec() {
            let ses = document.getElementById("arkaPlanMuzik");
            let secilen = muzikListesi[Math.floor(Math.random() * muzikListesi.length)];
            ses.src = secilen;
        }

        let secilenKelime = "", toplamPuan = 0, kalanSure = 0, zamanlayici, ipucuSayaci = 0, ipucuAraligi = 0;
        let can = 3, kombo = 0, gorunenHarfler = [], baslangicZamani = 0;
        let sonBilinemeyenKelime = "";

        let enYuksekSkor = parseInt(localStorage.getItem("secoRekor")) || 0;
        let enYuksekSeri = parseInt(localStorage.getItem("secoSeriRekor")) || 0;
        let rekorSahibi = localStorage.getItem("secoRekorSahibi") || "Yok";
        
        function ekranGuncelle() {
            document.getElementById("rekorGosterge").innerText = "🏆 En Yüksek: " + enYuksekSkor + " (" + rekorSahibi + ")";
            document.getElementById("seriGosterge").innerText = "🔥 Üst Üste: " + kombo + " | Seri Rekoru: " + enYuksekSeri;
        }
        ekranGuncelle();

        function muzikToggle() { 
            let ses = document.getElementById("arkaPlanMuzik"); 
            ses.paused ? ses.play() : ses.pause(); 
        }

        function sesCal(id) { let ses = document.getElementById(id); if(ses) { ses.currentTime = 0; ses.play(); } }

        function oyunuBaslat() {
            let girenIsim = document.getElementById("nickInput").value.trim();
            if (girenIsim !== "") oyuncuAdi = girenIsim.toUpperCase();
            
            document.getElementById("nickModal").style.display = "none";
            document.getElementById("oyuncuIsimGosterge").innerText = "👤 OYUNCU: " + oyuncuAdi;
            yeniSoru();
        }

        function rekoruSifirlaSifreli() {
            document.getElementById("adminModal").style.display = "flex";
            document.getElementById("adminInput").value = "";
            document.getElementById("adminMesaj").innerText = ""; // Mesajı temizle
            document.getElementById("adminInput").focus();
        }

        function kapatAdminModal() {
            document.getElementById("adminModal").style.display = "none";
        }

        function sifreOnayla() {
            const sifre = document.getElementById("adminInput").value;
            const mesajKutusu = document.getElementById("adminMesaj");
            
            if (sifre === "780878") {
                localStorage.setItem("secoRekor", 0);
                localStorage.setItem("secoSeriRekor", 0);
                localStorage.setItem("secoRekorSahibi", "Yok"); 
                enYuksekSkor = 0; enYuksekSeri = 0; kombo = 0; rekorSahibi = "Yok";
                ekranGuncelle();
                
                mesajKutusu.style.color = "#2ecc71";
                mesajKutusu.innerText = "Tüm rekorlar başarıyla sıfırlandı!";
                
                setTimeout(() => {
                    document.getElementById("adminModal").style.display = "none";
                }, 1500); // 1.5 saniye sonra pencereyi otomatik kapat
                
            } else {
                mesajKutusu.style.color = "#e74c3c";
                mesajKutusu.innerText = "Hatalı şifre!";
                document.getElementById("adminInput").value = "";
                document.getElementById("adminInput").focus();
                
                setTimeout(() => {
                    mesajKutusu.innerText = "";
                }, 2000); // 2 saniye sonra hata mesajını sil
            }
        }

        function canGuncelle(mesajVer = false) {
            let kalpler = "";
            for(let i=0; i<can; i++) kalpler += "❤️";
            for(let i=0; i<3-can; i++) kalpler += "🖤";
            document.getElementById("canlar").innerText = kalpler;
            if(mesajVer && can < 3) document.getElementById("mesaj").innerHTML = "<span style='color:#ffffff'>+1 CAN KAZANDIN! 💖</span>";
            if(can <= 0) gameOver();
        }

        function yeniSoru() {
            if(can <= 0) return;
            ipucuSayaci = 0;
            secilenKelime = kelimeListesi[Math.floor(Math.random() * kelimeListesi.length)];
            gorunenHarfler = new Array(secilenKelime.length).fill(false);
            kalanSure = secilenKelime.length <= 4 ? 10 : 20;
            ipucuAraligi = secilenKelime.length <= 4 ? 5 : 6;
            
            baslangicZamani = Date.now();

            let el = document.getElementById("karisik-kelime");
            el.classList.remove("parla");
            el.style.color = "#f1c40f";
            
            // BURASI DEĞİŞTİ: Çözülecek karışık kelime KÜÇÜK HARF yapıldı
            el.innerText = secilenKelime.toLowerCase().split('').sort(() => Math.random() - 0.5).join('');
            
            document.getElementById("ipucu").innerText = "_".repeat(secilenKelime.length);
            document.getElementById("tahmin").value = "";
            document.getElementById("tahmin").focus();
            document.getElementById("gecen-sure-ekran").innerText = ""; 

            clearInterval(zamanlayici);
            zamanlayici = setInterval(sureyiGuncelle, 1000);
            document.getElementById("sure").innerText = "Süre: " + kalanSure;
            document.getElementById("sure").classList.remove("panik");
        }

        function sureyiGuncelle() {
            kalanSure--;
            document.getElementById("sure").innerText = "Süre: " + kalanSure;
            if(kalanSure <= 3 && kalanSure > 0) document.getElementById("sure").classList.add("panik");
            
            let toplamS = (secilenKelime.length <= 4 ? 10 : 20);
            if ((toplamS - kalanSure) > 0 && (toplamS - kalanSure) % ipucuAraligi === 0 && ipucuSayaci < secilenKelime.length) {
                let gizli = []; gorunenHarfler.forEach((d, i) => { if (!d) gizli.push(i); });
                if(gizli.length > 0) {
                    let rnd = gizli[Math.floor(Math.random() * gizli.length)];
                    gorunenHarfler[rnd] = true; ipucuSayaci++;
                    let g = ""; for(let i=0; i<secilenKelime.length; i++) g += gorunenHarfler[i] ? secilenKelime[i] : "_";
                    document.getElementById("ipucu").innerText = g;
                }
            }

            if (kalanSure <= 0) {
                clearInterval(zamanlayici);
                sonBilinemeyenKelime = secilenKelime;
                kombo = 0; can--; canGuncelle(); ekranGuncelle();
                document.getElementById("mesaj").innerHTML = "<span style='color:#e74c3c'>ZAMAN DOLDU! -1 Can ⌛</span>";
                document.getElementById("karisik-kelime").style.color = "#e74c3c";
                
                document.getElementById("karisik-kelime").innerText = secilenKelime.toLowerCase();
                
                if(can > 0) setTimeout(yeniSoru, 2000);
            }
        }

        function kontrolEt() {
            if(can <= 0) return;
            let input = document.getElementById("tahmin");
            let tahmin = input.value.toLowerCase().trim();
            let mesaj = document.getElementById("mesaj");
            let el = document.getElementById("karisik-kelime");
            let sureGosterge = document.getElementById("gecen-sure-ekran");
            
            if (tahmin === secilenKelime) {
                clearInterval(zamanlayici);
                
                let bitisZamani = Date.now();
                let gecenSureSaniye = (bitisZamani - baslangicZamani) / 1000;
                
                sureGosterge.innerText = "Yazma Hızın: " + gecenSureSaniye.toFixed(2) + " sn";

                let puanDegisim = 0;
                if (gecenSureSaniye < 1.5) {
                    puanDegisim = 1000; 
                    mesaj.innerHTML = "🚀 <span style='color:#f1c40f'>EFSANEVİ HIZ (+1000)!</span>";
                } else if (gecenSureSaniye < 3.0) {
                    puanDegisim = 500; 
                    mesaj.innerHTML = "⚡ <span style='color:#3498db'>HARİKA HIZ (+500)!</span>";
                } else {
                    puanDegisim = 200; 
                    mesaj.innerHTML = "✅ <span style='color:#2ecc71'>DOĞRU CEVAP (+200)!</span>";
                }
                
                toplamPuan += puanDegisim;

                kombo++;
                if(kombo > enYuksekSeri) { 
                    enYuksekSeri = kombo; 
                    localStorage.setItem("secoSeriRekor", enYuksekSeri); 
                }
                
                if(toplamPuan > enYuksekSkor) { 
                    roketKutlamasi(); 
                    enYuksekSkor = toplamPuan; 
                    rekorSahibi = oyuncuAdi; 
                    
                    localStorage.setItem("secoRekor", enYuksekSkor); 
                    localStorage.setItem("secoRekorSahibi", rekorSahibi);
                }
                
                ekranGuncelle();
                if(kombo % 5 === 0 && can < 3) { can++; canGuncelle(true); }

                el.classList.add("parla");
                
                el.innerText = secilenKelime.toLowerCase();
                document.getElementById("toplamPuan").innerText = toplamPuan;
                
                sesCal("dogruSes");
                setTimeout(yeniSoru, 1500);

            } else {
                sureGosterge.innerText = "";
                sonBilinemeyenKelime = secilenKelime;
                sesCal("yanlisSes");
                kombo = 0; can--; canGuncelle(); ekranGuncelle();
                el.style.color = "#e74c3c";
                
                el.innerText = secilenKelime.toLowerCase();
                mesaj.innerHTML = "<span style='color:#e74c3c'>❌ YANLIŞ!</span>";
                document.getElementById("anaKapsayici").classList.add("sarsil");
                setTimeout(() => document.getElementById("anaKapsayici").classList.remove("sarsil"), 300);
                
                if(can > 0) setTimeout(yeniSoru, 1500);
            }
        }

        function roketKutlamasi() {
            const roket = document.getElementById("roket");
            roket.classList.remove("roket-yorunge");
            void roket.offsetWidth; 
            roket.classList.add("roket-yorunge");
            
            var duration = 4 * 1000; var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };
            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: Math.random(), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function gameOver() {
            clearInterval(zamanlayici);
            document.getElementById("game-over").style.display = "flex";
            
            let htmlContent = "<span style='color:#f1c40f; font-size: 35px; font-weight:bold;'>" + oyuncuAdi + "</span><br>";
            htmlContent += "Skorun: " + toplamPuan + "<br>En İyi Serin: " + enYuksekSeri;
            
            if (sonBilinemeyenKelime) {
                htmlContent += "<br><br><span style='font-size: 18px;'>Bilemediğin kelime:</span><br><span style='color:#f1c40f; font-size: 35px; font-weight:bold; text-transform:lowercase;'>" + sonBilinemeyenKelime.toLowerCase() + "</span>";
            }
            document.getElementById("final-puan").innerHTML = htmlContent;
        }

        function oyunuSifirla() { location.reload(); }
        
        document.getElementById("tahmin").addEventListener("keypress", (e) => { if(e.key === "Enter") kontrolEt(); });
        
        window.onload = () => { 
            oyunAlaniniOlceklendir(); 
            muzikSec(); 
            document.getElementById("nickModal").style.display = "flex";
            document.getElementById("nickInput").focus();
        };
    </script>
</body>
</html>
