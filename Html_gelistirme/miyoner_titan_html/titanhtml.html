<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MİLYONER TİTAN FULL HD - SHOW EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #000033;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #bgCanvas, #particleCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        #particleCanvas { z-index: 100; pointer-events: none; }

        #confettiCanvas {
            position: fixed;
            top: 0; 
            left: 0;
            width: 100vw; 
            height: 100vh;
            z-index: 9999;
            pointer-events: none;
            display: none;
        }

        #app {
            width: 1024px;
            height: 768px;
            max-width: 95vw;
            max-height: 95vh;
            background: rgba(0, 0, 51, 0.85);
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            border: 1px solid rgba(0, 255, 255, 0.1);
            transform-origin: center;
            transition: transform 0.2s ease-out;
        }

        .secovvv-logo {
            font-size: 32px;
            font-weight: bold;
            font-style: italic;
            text-align: center;
            margin: 0;
            background: linear-gradient(90deg, #FF4500, #FFD700, #FF0000, #FFFFFF);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientMove 2s infinite linear, pulse 1.5s infinite alternate;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px rgba(255,215,0,0.5); }
            100% { transform: scale(1.05); text-shadow: 0 0 20px rgba(255,69,0,0.8); }
        }

        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: bold;
            border-bottom: 2px solid #1a1a4d;
        }

        .header-panel span { color: #00FFFF; }
        .header-panel .score { color: white; }
        .header-panel .record { color: gold; }

        .kaynak-secici { 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            background: rgba(0,0,0,0.5); 
            padding: 6px 12px; 
            border-radius: 20px; 
            border: 1px solid #333;
        }
        .secenek { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            cursor: pointer; 
        }
        .secenek label {
            cursor: pointer;
            color: #ddd;
            transition: color 0.3s;
            font-size: 13px;
        }
        .secenek:hover label { color: #fff; }
        .buton {
            width: 12px; height: 12px;
            border-radius: 50%;
            background-color: #444;
            border: 2px solid #aaa;
            transition: all 0.3s ease;
        }
        .buton.active {
            background-color: #00FF00;
            border-color: #00FF00;
            box-shadow: 0 0 8px #00FF00;
        }

        .main-content {
            display: flex;
            flex: 1;
            gap: 20px;
        }

        .game-area {
            flex: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .jokers {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .joker-btn, .action-btn {
            background: #1a1a4d;
            color: #FFD700;
            border: 2px solid #333;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .joker-btn:hover:not(:disabled) { background: #FFD700; color: black; }
        .joker-btn:disabled { background: #111; color: #444; cursor: not-allowed; border-color: #000; }
        
        .action-btn.restart { background: #005500; color: white; }
        .action-btn.reset { background: #440000; color: white; }

        .timer {
            font-size: 36px;
            font-weight: bold;
            color: #00FF00;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }

        .question-box {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            background: #00001a;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #5555ff;
            width: 100%;
            margin-bottom: 30px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 20px rgba(0, 0, 255, 0.2);
        }

        .answers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .answer-btn {
            background: #050550;
            color: white;
            border: 2px solid #333;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .answer-btn:hover:not(:disabled) {
            background: #FFD700;
            color: black;
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .alt-panel {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding-bottom: 10px;
        }

        .money-tree {
            flex: 1;
            background: #00001a;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-between;
            border: 1px solid #1a1a4d;
        }

        .money-item {
            padding: 5px 10px;
            text-align: right;
            font-weight: bold;
            color: white;
            border-radius: 5px;
            transition: 0.3s;
            font-size: 13px;
        }

        .money-item.active { background: #FFD700; color: black; box-shadow: 0 0 10px gold; }
        .money-item.passed { color: #555; }
        
        #modal, #inputModal {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(0, 0, 51, 0.98), rgba(0, 0, 100, 0.98));
            border: 3px solid #00FFFF;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 0 100px rgba(0, 0, 0, 0.9);
            min-width: 450px;
        }
        
        #modal h2, #inputModal h2 { margin-top: 0; color: #FFD700; font-size: 32px; text-transform: uppercase; }
        
        /* Özel Input Stilleri */
        #inputModal input {
            width: 80%;
            padding: 15px;
            margin: 25px 0;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #00FFFF;
            border-radius: 10px;
            color: white;
            font-size: 20px;
            text-align: center;
            outline: none;
            transition: 0.3s;
        }
        
        #inputModal input:focus {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
        }

        .modal-btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        #modal button, .input-modal-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #FFD700;
            color: black;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 50px;
            transition: 0.3s;
        }
        
        #modal button:hover, .input-modal-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4); }
        
        .input-modal-btn.cancel {
            background: #8B0000;
            color: white;
        }
        .input-modal-btn.cancel:hover {
            box-shadow: 0 5px 15px rgba(139, 0, 0, 0.6);
        }

        .result-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px dashed #00FFFF;
        }
        .result-line { font-size: 20px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .result-val { color: #00FF00; font-weight: bold; }

        .custom-alert {
            position: absolute;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 30, 0.95);
            border: 2px solid #00FFFF;
            color: #FFD700;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            z-index: 1500;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-align: center;
            pointer-events: none;
        }

        .custom-alert.show {
            opacity: 1;
            visibility: visible;
            top: 40px;
        }
    </style>
</head>

<canvas id="particleCanvas"></canvas>

                        <label>Windows Sesleri</label>

                    <div class="secenek" onclick="sesTuruDegistir('disari')">
                        <span class="buton" id="disSesBtn"></span>
                        <label>Dışarıdan Sesler</label>
                    </div>
                </div>
            </div>
            
        </div>

        <div class="money-tree" id="moneyTree"></div>
    </div>
</div>

<div id="modal">
    <h2 id="modalTitle">TEBRİKLER!</h2>
    <div class="result-card" id="modalText"></div>
    <button onclick="kapatVeSifirla()">DEVAM ET</button>
</div>

<div id="inputModal">
    <h2 id="inputModalTitle">BAŞLIK</h2>

</div>

    { soru: "Bonus Sinema: Beşiktaş taraftarı olan, 'Zübük' ve 'Bekçiler Kralı' filmlerinin unutulmaz oyuncusu?", siklar: ["Şener Şen", "Kemal Sunal", "İlyas Salman", "Metin Akpınar"], cevap: 1 },
    { soru: "Final: Secovvv'un en sevdiği oyun türlerinden olan, sinemadan uyarlanan 'Word Hunt' projesinin temeli?", siklar: ["Resim", "Kelime", "Sayı", "Müzik"], cevap: 1 },
    { soru: "Güle Güle: Sinemanın ilk halkası olan 'Lumiere Kardeşler' hangi ülkelidir?", siklar: ["Almanya", "Fransa", "ABD", "İngiltere"], cevap: 1 }
    // DİĞER SORULARINI KOPYALAYIP ALT ALTA BURAYA EKLEMEYE DEVAM ET...
    // 👆👆👆 DİKKAT: ESKİ DOSYANDAKİ 1000 SORULUK LİSTENİ BURAYA YAPIŞTIR 👆👆👆
    ];

    const oduller = [
        "100 TL", "250 TL", "500 TL (BARAJ)", "1.000 TL", "2.000 TL",
        "3.000 TL", "5.000 TL (BARAJ)", "7.500 TL ", "15.000 TL", "30.000 TL",
        "60.000 TL", "125.000 TL (BARAJ)", "250.000 TL", "500.000 TL", "1.000.000 TL"
    ];

    let secilenSorular = [];
    let soruIndex = 0;
    let toplamPuan = 0;
    let kalanSure = 30;
    let timerId = null;
    let garantiOdul = "0 TL";
    let oyuncuAdi = "SECOVVV";
    let beklemeAktif = false;
    let ciftHakki = false;
    let botAktif = false;
    let rekor = 0;
    let konfetiAktif = false;
    let kullanildi = { CIFT: false, YARI: false, TELEFON: false };
    let alertTimeout = null;
    
    let seciliKaynak = 'html'; 
    window.disSorular = [];

    let aktifSesTuru = 'windows';
    const sesDosyalari = {
        windows: {
            dogru: new Audio('https://www.myinstants.com/media/sounds/windows-xp-ding.mp3'),
            yanlis: new Audio('https://www.myinstants.com/media/sounds/windows-xp-error.mp3'),
            kazandi: new Audio('https://www.myinstants.com/media/sounds/tada.mp3')
        },
        disari: {
             dogru: new Audio('./firem1.mp3'), 
             yanlis: new Audio('./failm1.mp3'),
            kazandi: new Audio('./interstellar.mp3')
        }
    };

    function sesCal(durum) {
        let ses = sesDosyalari[aktifSesTuru][durum];
        ses.currentTime = 0; 
        ses.play().catch(e => console.log("Ses oynatma engellendi: ", e));
    }

    function sesTuruDegistir(tur) {
        if (aktifSesTuru === tur) return;
        aktifSesTuru = tur;
        document.getElementById('winSesBtn').classList.toggle('active', tur === 'windows');
        document.getElementById('disSesBtn').classList.toggle('active', tur === 'disari');
        oyunaOzelBildirim(tur === 'windows' ? "🔊 Ses Kaynağı: Windows" : "🎵 Ses Kaynağı: Dışarıdan", 2000);
    }

    function ekraniOlcekle() {
        const app = document.getElementById('app');
        if(!app) return;
        const pencereGenislik = window.innerWidth * 0.95;
        const pencereYukseklik = window.innerHeight * 0.95;
        
        const anaGenislik = 1024;
        const anaYukseklik = 768;
        
        const oranGenislik = pencereGenislik / anaGenislik;
        const oranYukseklik = pencereYukseklik / anaYukseklik;
        
        const olcek = Math.min(oranGenislik, oranYukseklik); 
        app.style.transform = `scale(${olcek})`;
    }

    window.addEventListener('resize', ekraniOlcekle);

    // --- ÖZEL İNPUT MODAL SİSTEMİ ---
    let inputCallback = null;

    function ozelPencereGoster(baslik, placeholder, tip, iptalGoster, callback) {
        document.getElementById("inputModalTitle").innerText = baslik;
        const inputF = document.getElementById("inputField");
        inputF.type = tip;
        inputF.placeholder = placeholder;
        inputF.value = "";
        
        document.getElementById("inputCancelBtn").style.display = iptalGoster ? "inline-block" : "none";
        document.getElementById("inputModal").style.display = "block";
        inputF.focus();
        
        inputCallback = callback;
    }

    function ozelPencereKapat() {
        document.getElementById("inputModal").style.display = "none";
        document.getElementById("inputField").blur();
    }

    document.getElementById("inputConfirmBtn").addEventListener("click", () => {
        const val = document.getElementById("inputField").value;
        ozelPencereKapat();
        if(inputCallback) inputCallback(val);
    });

    document.getElementById("inputCancelBtn").addEventListener("click", () => {
        ozelPencereKapat();
        if(inputCallback) inputCallback(null);
    });

    // Klavyeden Enter'a basınca otomatik onaylama
    document.getElementById("inputField").addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
            document.getElementById("inputConfirmBtn").click();
        }
    });
    // ---------------------------------

    window.onload = () => {
        ekraniOlcekle(); 
        rekorYukle();
        baslatArkaPlan();
        paraAgaciniOlustur(); // Arka planda dursun

        // Tarayıcı prompt'u yerine yeni neon modülü kullanıyoruz:
        ozelPencereGoster("TİTAN GİRİŞİ", "Adınızı Yazın (Örn: Secovvv)", "text", false, (isim) => {
            if(isim && isim.trim() !== "") {
                oyuncuAdi = isim.trim().toUpperCase();
            }
            document.getElementById("playerName").innerText = `👤 ${oyuncuAdi}`;
            initGame();
        });
    };

    function oyunaOzelBildirim(mesaj, sure = 3000) {
        const alertBox = document.getElementById("customAlert");
        alertBox.innerHTML = mesaj;
        alertBox.classList.add("show");
        
        clearTimeout(alertTimeout);
        alertTimeout = setTimeout(() => {
            alertBox.classList.remove("show");
        }, sure);
    }

    async function kaynakDegistir(tip) {
        if (seciliKaynak === tip) return; 
        
        document.getElementById('htmlBtn').classList.toggle('active', tip === 'html');
        document.getElementById('jsonBtn').classList.toggle('active', tip === 'json');
        
        seciliKaynak = tip;

        if (tip === 'json') {
            try {
                const response = await fetch('sorular.json');
                if (!response.ok) throw new Error("Dosya okunamadı");
                window.disSorular = await response.json();
                
                oyunaOzelBildirim("✅ Dış Kaynak: JSON soruları yüklendi! Sistem yeniden başlıyor...", 3000);
                setTimeout(initGame, 1500);
            } catch (e) {
                oyunaOzelBildirim("⚠️ JSON dosyası okunamadı! Gömülü HTML sorularına dönülüyor.", 3500);
                seciliKaynak = 'html';
                document.getElementById('htmlBtn').classList.add('active');
                document.getElementById('jsonBtn').classList.remove('active');
                setTimeout(initGame, 1500);
            }
        } else {
            oyunaOzelBildirim("🔄 İç Kaynak: Gömülü HTML sorularına geçildi! Sistem yeniden başlıyor...", 3000);
            setTimeout(initGame, 1500);
        }
    }

    function initGame() {
        konfetiAktif = false;
        document.getElementById('confettiCanvas').style.display = "none";
        document.getElementById("modal").style.display = "none";
        
        let aktifHavuz = (seciliKaynak === 'html') ? butunSorular : (window.disSorular.length > 0 ? window.disSorular : butunSorular);
        
        document.getElementById("soruHavuzuBilgi").innerText = `📂 ${aktifHavuz.length} SORU`;

        let alinacakSoruSayisi = Math.min(15, aktifHavuz.length);
        let hamSorular = [...aktifHavuz].sort(() => Math.random() - 0.5).slice(0, alinacakSoruSayisi);

        secilenSorular = hamSorular.map(soruObj => {
            let dogruCevapMetni = soruObj.siklar[soruObj.cevap];
            let karisikSiklar = [...soruObj.siklar].sort(() => Math.random() - 0.5);
            let yeniCevapIndeksi = karisikSiklar.indexOf(dogruCevapMetni);
            
            return {
                soru: soruObj.soru,
                siklar: karisikSiklar,
                cevap: yeniCevapIndeksi
            };
        });

        soruIndex = 0;
        toplamPuan = 0;
        botAktif = false;
        ciftHakki = false;
        garantiOdul = "0 TL";
        beklemeAktif = false;
        kullanildi = { CIFT: false, YARI: false, TELEFON: false };
        
        document.getElementById("scoreDisplay").innerText = `💎 PUAN: 0`;
        
        jokerGuncelle();
        paraAgaciniOlustur();
        soruYukle();
    }

    function paraAgaciniOlustur() {
        const tree = document.getElementById("moneyTree");
        tree.innerHTML = "";
        oduller.forEach((odul, index) => {
            const div = document.createElement("div");
            div.className = "money-item";
            div.id = `para-${index}`;
            div.innerText = odul;
            tree.appendChild(div);
        });
    }

    function soruYukle() {
        if(soruIndex >= 3) garantiOdul = "500 TL";
        if(soruIndex >= 8) garantiOdul = "7.500 TL";
        if(soruIndex >= 12) garantiOdul = "125.000 TL";

        jokerGuncelle();
        beklemeAktif = false;
        ciftHakki = false;
        kalanSure = 30;
        document.getElementById("timerDisplay").innerText = `SÜRE: ${kalanSure}`;
        document.getElementById("timerDisplay").style.color = "#00FF00";
        
        clearInterval(timerId);
        timerId = setInterval(sureGuncelle, 1000);

        for(let i=0; i<15; i++) {
            let el = document.getElementById(`para-${i}`);
            if(el) {
                if(i === soruIndex) el.className = "money-item active";
                else if(i < soruIndex) el.className = "money-item passed";
                else el.className = "money-item";
            }
        }

        const soru = secilenSorular[soruIndex];
        document.getElementById("questionText").innerText = `SORU ${soruIndex + 1}: ${soru.soru}`;

        const butonlar = document.querySelectorAll(".answer-btn");
        butonlar.forEach((btn, i) => {
            btn.innerText = soru.siklar[i];
            btn.style.background = "#050550";
            btn.style.color = "white";
            btn.disabled = false;
            btn.style.opacity = "1";
        });

        if(botAktif) setTimeout(otomatikCevapla, 1000);
    }

    function jokerGuncelle() {
        const jArr = [
            {id: 'btnCift', key: 'CIFT', active: soruIndex + 1 >= 3},
            {id: 'btnYari', key: 'YARI', active: soruIndex + 1 >= 7},
            {id: 'btnTelefon', key: 'TELEFON', active: soruIndex + 1 >= 12}
        ];
        jArr.forEach(j => {
            const btn = document.getElementById(j.id);
            if(kullanildi[j.key]) {
                btn.disabled = true; btn.style.background = "#222";
            } else if(j.active) {
                btn.disabled = false; btn.style.background = "#1a1a4d";
            } else {
                btn.disabled = true; btn.style.background = "#111";
            }
        });
    }

    function cevapla(secim) {
        if(beklemeAktif) return;
        beklemeAktif = true;
        clearInterval(timerId);

        const butonlar = document.querySelectorAll(".answer-btn");
        const dogruCevap = secilenSorular[soruIndex].cevap;

        let count = 0;
        let flash = setInterval(() => {
            butonlar[secim].style.background = count % 2 === 0 ? "#FF8C00" : "#050550";
            count++;
            if(count > 5) {
                clearInterval(flash);
                if(secim === dogruCevap) {
                    sesCal('dogru'); 
                    toplamPuan += 1000 + (kalanSure * 100);
                    document.getElementById("scoreDisplay").innerText = `💎 PUAN: ${toplamPuan}`;
                    butonlar[secim].style.background = "#00FF00";
                    butonlar[secim].style.color = "black";
                    patlamaEfekti(butonlar[secim]);
                    
                    setTimeout(() => {
                        soruIndex++;
                        if(soruIndex < 15) {
                            soruYukle();
                        } else {
                            oyunBitir("EFSANEVİ TİTAN! 🌟", true);
                        }
                    }, 1500);
                } else {
                    sesCal('yanlis'); 
                    if(ciftHakki) {
                        ciftHakki = false;
                        butonlar[secim].style.background = "#8B0000";
                        butonlar[secim].disabled = true;
                        beklemeAktif = false;
                        timerId = setInterval(sureGuncelle, 1000);
                        oyunaOzelBildirim("⚠️ Yanlış Cevap! İkinci hakkınızı kullanın.", 2500);
                    } else {
                        butonlar[secim].style.background = "#8B0000";
                        butonlar[dogruCevap].style.background = "#00FF00";
                        butonlar[dogruCevap].style.color = "black";
                        setTimeout(() => oyunBitir("GÖREV BAŞARISIZ!", false), 1500);
                    }
                }
            }
        }, 150);
    }

    function sureGuncelle() {
        if(kalanSure > 0) {
            kalanSure--;
            const timerEl = document.getElementById("timerDisplay");
            timerEl.innerText = `SÜRE: ${kalanSure}`;
            if(kalanSure <= 10) timerEl.style.color = "#FF4500";
        } else {
            clearInterval(timerId);
            sesCal('yanlis'); 
            oyunBitir("ZAMAN TÜKENDİ!", false);
        }
    }

    function kullanYari() {
        if(kullanildi.YARI || beklemeAktif) return;
        kullanildi.YARI = true;
        jokerGuncelle();
        let dogru = secilenSorular[soruIndex].cevap;
        let butonlar = document.querySelectorAll(".answer-btn");
        let elendi = 0;
        let indices = [0,1,2,3].sort(() => Math.random() - 0.5);
        indices.forEach(idx => {
            if(idx !== dogru && elendi < 2) {
                butonlar[idx].disabled = true;
                butonlar[idx].style.opacity = "0.2";
                butonlar[idx].innerText = "";
                elendi++;
            }
        });
        oyunaOzelBildirim("⚖️ Yanlış iki şık elendi!");
    }

    function kullanCift() {
        if(kullanildi.CIFT || beklemeAktif) return;
        kullanildi.CIFT = true;
        jokerGuncelle();
        ciftHakki = true;
        oyunaOzelBildirim("⚡ SİSTEM KORUMASI: Bu soruda 2 yanlış hakkınız var!", 4000);
    }

    function kullanTelefon() {
        if(kullanildi.TELEFON || beklemeAktif) return;
        kullanildi.TELEFON = true;
        jokerGuncelle();
        let dogruIndex = secilenSorular[soruIndex].cevap;
        let dogruMetin = secilenSorular[soruIndex].siklar[dogruIndex];
        oyunaOzelBildirim(`☎️ Analiz Robotu: <br><span style="color:#00FF00">"${dogruMetin}"</span> verisi yüksek ihtimalli.`, 5000);
    }

    function oyunBitir(mesaj, kazandi) {
        botAktif = false;
        clearInterval(timerId);
        
        const finalOdul = kazandi ? "1.000.000 TL" : garantiOdul;
        
        let kartHtml = `
            <div class="result-line"><span>OYUNCU:</span> <span class="result-val">${oyuncuAdi}</span></div>
            <div class="result-line"><span>KAZANÇ:</span> <span class="result-val" style="color:gold">${finalOdul}</span></div>
            <div class="result-line"><span>TOPLAM PUAN:</span> <span class="result-val">${toplamPuan}</span></div>
        `;

        if (!kazandi && secilenSorular[soruIndex]) {
            const dogruIndex = secilenSorular[soruIndex].cevap;
            const dogruMetin = secilenSorular[soruIndex].siklar[dogruIndex];
            kartHtml += `
            <div style="margin-top: 15px; padding-top: 15px; border-top: 1px dashed #555;">
                <div style="color: #FF4500; font-size: 16px; margin-bottom: 5px;">DOĞRU CEVAP:</div>
                <div style="color: #00FF00; font-size: 20px; font-weight: bold;">${dogruMetin}</div>
            </div>`;
        }
        
        skorKaydet();
        
        if(kazandi) {
            sesCal('kazandi'); 
            document.getElementById("modalTitle").innerText = "🏆 BÜYÜK ZAFER 🏆";
            document.getElementById('confettiCanvas').style.display = "block";
            konfetiAktif = true;
            konfetiPatlat();
        } else {
            document.getElementById("modalTitle").innerText = mesaj;
        }
        
        document.getElementById("modalText").innerHTML = kartHtml;
        document.getElementById("modal").style.display = "block";
    }

    function kapatVeSifirla() {
        document.getElementById("modal").style.display = "none";
        konfetiAktif = false;
        document.getElementById('confettiCanvas').style.display = "none";
        initGame();
    }

    function skorKaydet() {
        if(toplamPuan > rekor) {
            rekor = toplamPuan;
            localStorage.setItem("milyonerRekor", rekor);
            localStorage.setItem("milyonerRekorSahibi", oyuncuAdi);
            rekorYukle();
        }
    }

    function rekorYukle() {
        rekor = parseInt(localStorage.getItem("milyonerRekor")) || 0;
        let sahip = localStorage.getItem("milyonerRekorSahibi") || "Yok";
        document.getElementById("recordDisplay").innerText = `🏆 REKOR: ${rekor} (${sahip})`;
    }

    function rekorSifirla() {
        ozelPencereGoster("GÜVENLİK ŞİFRESİ", "Şifreyi girin...", "password", true, (sifre) => {
            if(sifre === "780878") {
                localStorage.clear();
                rekorYukle();
                oyunaOzelBildirim("🗑️ Sistem hafızası başarıyla sıfırlandı.", 3000);
            } else if (sifre !== null) {
                oyunaOzelBildirim("❌ Hatalı şifre!", 3000);
            }
        });
    }

    function konfetiPatlat() {
        const canvas = document.getElementById('confettiCanvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();
        
        let particles = [];
        const colors = ['#FFD700', '#00FFFF', '#FF00FF', '#00FF00', '#FFFFFF', '#FF4500'];

        for(let i=0; i<250; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 8 + 4,
                color: colors[Math.floor(Math.random() * colors.length)],
                speed: Math.random() * 5 + 3,
                angle: Math.random() * 6.28,
                rotation: Math.random() * 0.2
            });
        }

        function draw() {
            if(!konfetiAktif) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y += p.speed;
                p.x += Math.sin(p.angle) * 2;
                p.angle += p.rotation;
                
                ctx.fillStyle = p.color;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.angle);
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();

                if(p.y > canvas.height) p.y = -20;
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    function baslatArkaPlan() {
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let offset = 0;
        function ciz() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            offset += 0.03;
            for(let i = 0; i < Math.max(canvas.width, canvas.height); i += 40) {
                let alpha = (Math.sin(i * 0.01 + offset) + 1) / 4;
                ctx.beginPath();
                ctx.arc(canvas.width/2, canvas.height/2, i, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 100, 255, ${alpha})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            requestAnimationFrame(ciz);
        }
        ciz();
    }

    function patlamaEfekti(btn) {
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const r = btn.getBoundingClientRect();
        const x = r.left + r.width / 2;
        const y = r.top + r.height / 2;
        let pts = [];
        for(let i=0; i<40; i++) {
            pts.push({x:x, y:y, dx:(Math.random()-0.5)*20, dy:(Math.random()-0.5)*20, life:1.0});
        }
        function anim() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            let alive = false;
            pts.forEach(p => {
                if(p.life > 0) {
                    alive = true; p.x += p.dx; p.y += p.dy; p.life -= 0.03;
                    ctx.globalAlpha = p.life; ctx.fillStyle = "gold";
                    ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, 7); ctx.fill();
                }
            });
            if(alive) requestAnimationFrame(anim);
        }
        anim();
    }

    document.addEventListener("keydown", (e) => {
        if(e.ctrlKey && e.key === 'b') { botAktif = true; otomatikCevapla(); }
    });

    function otomatikCevapla() {
        if(botAktif && !beklemeAktif) cevapla(secilenSorular[soruIndex].cevap);
    }
</script>
